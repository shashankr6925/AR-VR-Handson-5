<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Web VR Physics Experience</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<a-scene physics="gravity: -9.8">

<!-- Camera -->
<a-entity position="0 1.6 4">
<a-camera>
<a-cursor></a-cursor>
</a-camera>
</a-entity>

<!-- Floor -->
<a-plane
rotation="-90 0 0"
width="20"
height="20"
color="#7BC8A4"
static-body>
</a-plane>

<!-- Interactive Cube -->
<a-box
id="cube"
position="0 2 -3"
color="red"
depth="1"
height="1"
width="1"
dynamic-body
class="clickable">
</a-box>

<!-- Sphere -->
<a-sphere
position="2 3 -4"
radius="0.5"
color="blue"
dynamic-body
class="clickable">
</a-sphere>

<!-- Light -->
<a-light type="directional" position="1 4 2"></a-light>

</a-scene>

<script src="script.js"></script>

</body>
</html>
